<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Find Undergoes by ID</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        /* ==========================================
           1. RESET & VARIABLES
           ========================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0f4f8;
            --radius: 16px;
            --font: 'DM Sans', sans-serif;
            --mono: 'DM Mono', monospace;
            --green: #16a34a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            padding: 40px 24px;
            color: var(--text-main);
        }

        /* ==========================================
           2. LAYOUT STRUCTURE
           ========================================== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .topbar {
            margin-bottom: 24px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 13px;
            padding: 8px 18px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: #fff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .badge {
            font-family: var(--mono);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 8px;
            background: #f0fdf4;
            color: var(--green);
            border: 1px solid #bbf7d0;
            text-transform: uppercase;
        }

        .content-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        /* ==========================================
           3. SEARCH FORM (THE FIXED SECTION)
           ========================================== */
        .search-bar {
            padding: 32px;
            padding-bottom: 40px; /* Added extra padding at the bottom for the hint */
            border-bottom: 1px solid #f1f5f9;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            background: #fafbfc;
            align-items: end; /* Aligns inputs and the button perfectly on their bottom edges */
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative; /* Crucial for absolute positioning of the hint */
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 12px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            font-family: var(--font);
            font-size: 14px;
            width: 100%;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
        }

        /* The Absolute Hint Fix */
        .hint {
            font-size: 11px;
            color: #94a3b8;
            font-family: var(--mono);
            position: absolute;
            top: 100%; /* Places it right under the input */
            left: 0;
            margin-top: 4px; /* Slight gap below the input */
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            height: 45px; /* Matches the vertical height of the inputs */
        }
        .btn:hover { opacity: 0.9; }

        /* ==========================================
           4. RESULTS DISPLAY
           ========================================== */
        .result-box {
            margin: 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .result-section {
            background: #fafbfc;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        .result-row:last-child { border-bottom: none; }

        .result-key {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .result-val {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text-main);
            font-weight: 500;
        }

        .no-result {
            padding: 48px;
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .result-box { grid-template-columns: 1fr; }
            body { padding: 20px 16px; }
            .search-bar { padding-bottom: 32px; }
            .hint { position: static; margin-top: 2px; } /* Reverts to normal flow on mobile */
        }
    </style>
</head>
<body>

<div class="container">

    <div class="topbar">
        <a th:href="@{/entity/bidwattam/Undergoes}" class="back-btn">← Back</a>
    </div>

    <div class="page-header">
        <span class="badge">GET</span>
        <h2 style="margin-top:8px;">Search Undergoes by Composite ID</h2>
        <p style="color: #94a3b8; font-family: var(--mono); font-size: 12px; margin-top: 4px;">/entity/bidwattam/Undergoes/{patient}/{procedure}/{stay}/{date}</p>
    </div>

    <div class="content-card">

        <form th:action="@{/entity/bidwattam/Undergoes/searchById}" method="get" class="search-bar">
            <div class="form-group">
                <label>Patient ID</label>
                <input type="number" name="patient" placeholder="e.g. 100000001" th:value="${param.patient}" required/>
            </div>
            <div class="form-group">
                <label>Procedure ID</label>
                <input type="number" name="procedure" placeholder="e.g. 2" th:value="${param.procedure}" required/>
            </div>
            <div class="form-group">
                <label>Stay ID</label>
                <input type="number" name="stay" placeholder="e.g. 3215" th:value="${param.stay}" required/>
            </div>
            <div class="form-group">
                <label>Date Undergoes</label>
                <input type="text" name="date" placeholder="2008-05-06T00:00:00" th:value="${param.date}" required/>
                <span class="hint">yyyy-MM-ddTHH:mm:ss</span>
            </div>
            <button class="btn" type="submit">Lookup</button>
        </form>

        <div th:if="${undergoesById != null}" class="result-box">

            <div class="result-section">
                <div class="section-title">Record Identifiers</div>
                <div class="result-row">
                    <span class="result-key">Patient ID</span>
                    <span class="result-val" th:text="${undergoesById['patient']}"></span>
                </div>
                <div class="result-row">
                    <span class="result-key">Procedure ID</span>
                    <span class="result-val" th:text="${undergoesById['procedure']}"></span>
                </div>
                <div class="result-row">
                    <span class="result-key">Stay ID</span>
                    <span class="result-val" th:text="${undergoesById['stay']}"></span>
                </div>
                <div class="result-row">
                    <span class="result-key">Date</span>
                    <span class="result-val" th:text="${undergoesById['dateUndergoes']}"></span>
                </div>
            </div>

            <div class="result-section">
                <div class="section-title">Assigned Personnel</div>
                <div class="result-row">
                    <span class="result-key">Physician</span>
                    <span class="result-val" th:text="${undergoesById['physician']}"></span>
                </div>
                <div class="result-row">
                    <span class="result-key">Assisting Nurse</span>
                    <span class="result-val" th:text="${undergoesById['assistingNurse']}"></span>
                </div>
            </div>

        </div>

        <div class="no-result" th:if="${undergoesById == null and param.patient != null}">
            No record found for the supplied composite key.
        </div>
    </div>
</div>

</body>
</html>
